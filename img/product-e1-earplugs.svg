  <line x1="111" y1="100" x2="111" y2="112" stroke="#c9a84c" stroke-width="0.8" opacity="0.5"/>
  <line x1="118" y1="102" x2="118" y2="114" stroke="#c9a84c" stroke-width="0.8" opacity="0.5"/>
  <line x1="132" y1="100" x2="132" y2="112" stroke="#c9a84c" stroke-width="0.8" opacity="0.5"/>
  <line x1="139" y1="102" x2="139" y2="114" stroke="#c9a84c" stroke-width="0.8" opacity="0.5"/>
  <!-- Brand label -->
